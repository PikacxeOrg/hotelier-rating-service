name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "9.0.x"
  CONFIGURATION: Release
  REGISTRY: docker.io
  IMAGE_NAME: hotelier-rating-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          versionSpec: '6.x'
          preferLatestVersion: true

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          useConfigFile: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore tests/RatingService.Tests/RatingService.Tests.csproj

      - name: Build
        run: dotnet build tests/RatingService.Tests/RatingService.Tests.csproj -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: |
          dotnet test tests/RatingService.Tests/RatingService.Tests.csproj \
            -c ${{ env.CONFIGURATION }} --no-build \
            --logger trx \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage

  integration-tests:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          versionSpec: '6.x'
          preferLatestVersion: true

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          useConfigFile: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Domain
        working-directory: src/RatingService.Domain
        run: dotnet restore --locked-mode

      - name: Restore Infrastructure
        working-directory: src/RatingService.Infrastructure
        run: dotnet restore --locked-mode

      - name: Restore Api
        working-directory: src/RatingService.Api
        run: dotnet restore --locked-mode

      - name: Build Api
        working-directory: src/RatingService.Api
        run: dotnet build --no-restore -c ${{ env.CONFIGURATION }}

      - name: Start infra via docker compose
        if: hashFiles('docker-compose.ci.yml') != ''
        run: |
          docker compose up -d postgres mongodb rabbitmq
          for service in postgres mongodb rabbitmq; do
            timeout 60 bash -c "until docker compose ps $service | grep 'Up'; do sleep 2; done"
          done
          docker compose ps

      - name: Run Integration Tests
        if: hashFiles('docker-compose.ci.yml') != ''
        working-directory: tests/RatingService.Tests
        run: dotnet test -c ${{ env.CONFIGURATION }} --logger trx

      - name: Tear down compose infra
        if: always() && hashFiles('docker-compose.ci.yml') != ''
        run: docker compose down -v

  docker-build-push:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    needs: [test, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          versionSpec: '6.x'
          preferLatestVersion: true

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@81f0bc44e27a689ce858668d7a2081ac2387b605
        with:
          useConfigFile: true

      - name: Write Kaniko docker config
        run: |
          mkdir -p "${{ github.workspace }}/.kaniko"
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ secrets.DOCKERHUB_USERNAME }}' '${{ secrets.DOCKERHUB_TOKEN }}' | base64 -w0)" \
            > "${{ github.workspace }}/.kaniko/config.json"

      - name: Build and push
        uses: docker://gcr.io/kaniko-project/executor:v1.23.0
        env:
          DOCKER_CONFIG: /github/workspace/.kaniko
        with:
          args: >-
            --dockerfile=/github/workspace/Dockerfile
            --context=dir:///github/workspace
            --destination=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }}
            ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && format('--destination={0}/{1}:latest', secrets.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
            --build-arg=VERSION=${{ steps.gitversion.outputs.semVer }}
            --cache=true
            --cache-repo=${{ secrets.DOCKERHUB_USERNAME }}/kaniko-cache
